    :root{
      --primary:#1d4ed8;
      --primary-2:#2563eb;
      --primary-3:#3b82f6;
      --danger:#dc2626;
      --success:#16a34a;
      --warning:#d97706;
      --dark:#0f172a;
      --muted:#64748b;
      --bg:#f8fafc;
      --card:#ffffff;
      --border:#e2e8f0;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(14,165,233,.06), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 100%);
      color: var(--dark);
      font-family: 'Cairo', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden-force { display:none !important; }

    .glass-header {
      background: rgba(239,246,255,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(191,219,254,.9);
      box-shadow: 0 12px 32px rgba(15,23,42,.08);
    }

    .bottom-nav {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(226,232,240,.9);
      box-shadow: 0 -8px 24px rgba(15,23,42,.08);
    }

    .fancy-card {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 12px 32px rgba(15,23,42,.06);
    }

    .section-card {
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.94));
      border: 1px solid rgba(226,232,240,.88);
      box-shadow: 0 12px 28px rgba(15,23,42,.05);
      border-radius: 28px;
    }

    .btn {
      transition: all .18s ease;
      transform: translateY(0);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(.985); }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      outline: none;
      transition: .18s ease;
      font-size: 14px;
      color: var(--dark);
    }

    .input, .select {
      padding: 12px 14px;
      min-height: 48px;
    }

    .textarea {
      padding: 12px 14px;
      min-height: 104px;
      resize: vertical;
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96,165,250,.18);
    }

    .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge-blue { background:rgba(59,130,246,.12); color:#1d4ed8; }
    .badge-red { background:rgba(239,68,68,.12); color:#dc2626; }
    .badge-green { background:rgba(34,197,94,.12); color:#15803d; }
    .badge-yellow { background:rgba(245,158,11,.12); color:#b45309; }
    .badge-slate { background:rgba(100,116,139,.12); color:#334155; }
    .badge-purple { background:rgba(139,92,246,.12); color:#6d28d9; }

    .status-bar {
      position: sticky;
      top: 74px;
      z-index: 45;
      margin: 10px auto 0;
      width: min(980px, calc(100% - 24px));
      border-radius: 18px;
      padding: 12px 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(15,23,42,.10);
      border: 1px solid transparent;
    }

    .status-bar.show { display:flex; }
    .status-bar.offline {
      background: #fffbeb;
      color: #d97706;
      border-color: #fde68a;
    }
    .status-bar.syncing {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }
    .status-bar.synced {
      background: #f0fdf4;
      color: #15803d;
      border-color: #bbf7d0;
    }

    .sync-box {
      display: none;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .sync-box.show {
      display: flex;
    }

    .sync-spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 4px solid rgba(37,99,235,.15);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }

    .sync-progress {
      flex: 1;
      height: 10px;
      background: #dbeafe;
      border-radius: 999px;
      overflow: hidden;
    }

    .sync-progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
      transition: width .25s ease;
    }

    .sync-percent {
      min-width: 52px;
      text-align: left;
      font-weight: 900;
      color: #1d4ed8;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.48);
      backdrop-filter: blur(6px);
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-panel {
      width: 100%;
      max-width: 920px;
      max-height: 90vh;
      overflow: auto;
      background: rgba(255,255,255,.98);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(15,23,42,.22);
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 140;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      background: rgba(15,23,42,.94);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: 0 14px 40px rgba(2,6,23,.28);

    .toast.success { background: rgba(22,163,74,.96); }

    .toast.warning { background: rgba(245,158,11,.98); color:#111827; }

    .table-modern {

    .table-modern th, .table-modern td {

    .invoice-paper {

      background: #fff;
      color: #0f172a;
      font-family: 'Cairo', sans-serif;
      padding: 28px;

    .invoice-header {
      border: 1px solid #dbeafe;

      padding: 22px;

      align-items:flex-start;
      min-width:0;

    .invoice-logo {

    .invoice-subtitle {

      color: #475569;
      margin-top: 6px;
      line-height: 1.9;

    }

    .invoice-meta {

      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }

    .invoice-meta-row {
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:6px 0;
      border-bottom:1px dashed #e2e8f0;
      font-size:13px;
    }

    .invoice-meta-row:last-child { border-bottom:none; }

    .online-dot, .offline-dot {
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .online-dot { background:#16a34a; box-shadow: 0 0 0 6px rgba(22,163,74,.12); }
    .offline-dot { background:#dc2626; box-shadow: 0 0 0 6px rgba(220,38,38,.12); }

    ::-webkit-scrollbar { width:7px; height:7px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media print {
      body { background:#fff !important; }
      .no-print { display:none !important; }
    }

    @media (max-width: 768px) {
      .invoice-paper { padding: 14px; }
      .invoice-header { padding: 16px; }
      .invoice-logo { width:72px; height:72px; }
      .invoice-title { font-size: 22px; }
      .invoice-meta { min-width:100%; }

</head>

<script>
    async function validateLicenseOnline(key, countLogin = true) {
      const trimmed = String(key || "").trim();
      if (!trimmed) return { ok: false, message: "يرجى إدخال المفتاح" };
      if (!navigator.onLine) return { ok: false, message: "يلزم توفر الإنترنت لأول مرة للتحقق من المفتاح" };

      await ensureFirebaseReady();
      const { ref, get, update } = window.feeFirebase;
      const installationId = generateInstallationId();

      try {
        const licenseRef = ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`);
        const snapshot = await get(licenseRef);

        if (!snapshot.exists()) {
          return { ok: false, message: "المفتاح غير صالح" };
        }

        const remoteLicense = snapshot.val() || {};
        if (remoteLicense.status !== "active") {
          return { ok: false, message: "هذا المفتاح معطل" };
        }

        const isPermanent = !!remoteLicense.isPermanent;
        const expiresAt = isPermanent ? null : Number(remoteLicense.expiresAt || 0);
        const allowUnlimitedDevices = !!remoteLicense.allowUnlimitedDevices;
        const maxDevices = allowUnlimitedDevices ? null : Number(remoteLicense.maxDevices || 1);
        const loginCount = Number(remoteLicense.loginCount || 0);
        const syncMode = remoteLicense.syncMode || "online_sync";

        if (!isPermanent && expiresAt && Date.now() >= expiresAt) {
          return { ok: false, message: "المفتاح منتهي" };
        }

        if (countLogin && !allowUnlimitedDevices && loginCount >= maxDevices) {
          return { ok: false, message: "تم استهلاك عدد الأجهزة المسموح" };
        }

        if (countLogin) {
          const payload = {
            lastLoginAt: Date.now(),
            lastInstallationId: installationId
          };
          if (!allowUnlimitedDevices) payload.loginCount = loginCount + 1;
          await update(licenseRef, payload);
        }

        const licenseData = {
          key: trimmed,
          companyName: remoteLicense.companyName || DEFAULT_SETTINGS.companyName,
          logo: remoteLicense.logo || "",
          planType: remoteLicense.planType || "regular",
          isPermanent,
          expiresAt,
          status: remoteLicense.status || "active",
          usersEnabled: !!remoteLicense.usersEnabled,
          allowUnlimitedDevices,
          maxDevices,
          syncMode,
          cachedAt: Date.now(),
          installationId
        };

        return { ok: true, license: licenseData };
      } catch (error) {
        console.error(error);
        return { ok: false, message: "تعذر التحقق من المفتاح" };
      }
    }

    function saveCachedLicense(license) {
      localStorage.setItem(LICENSE_CACHE_KEY, JSON.stringify(license));

    function clearCachedLicense() {
      localStorage.removeItem(LICENSE_CACHE_KEY);

    function updateConnectionUI() {
      const dot = document.getElementById("connectionDot");
      const txt = document.getElementById("connectionText");

      if (!dot || !txt) return;

      if (isLocalOnlyMode()) {
        dot.className = "online-dot";
        txt.textContent = "نسخة محلية";
        return;
      }

      if (navigator.onLine) {
        dot.className = "online-dot";
        txt.textContent = "متصل";
      } else {
        dot.className = "offline-dot";
        txt.textContent = "غير متصل";
      }
    }

    function updateSyncProgress(percent = 0) {
      state.syncPercent = Math.max(0, Math.min(100, Math.round(percent)));
      const fill = document.getElementById("sync-progress-fill");
      const txt = document.getElementById("sync-percent");
      if (fill) fill.style.width = `${state.syncPercent}%`;
      if (txt) txt.textContent = `${state.syncPercent}%`;
    }

    function updatePendingSyncBadge() {
      const badge = document.getElementById("pending-sync-badge");
      if (!badge) return;
      badge.textContent = String(state.queue.length);
      badge.classList.toggle("hidden-force", state.queue.length === 0);
    }

    function updateSyncStatusBar(force = "") {
      const bar = document.getElementById("sync-status-bar");
      const text = document.getElementById("sync-status-text");
      const box = document.getElementById("sync-box");
      if (!bar || !text || !box) return;

      bar.className = "status-bar no-print";
      box.classList.remove("show");

      let status = force || state.syncStatus;

      if (isLocalOnlyMode()) {
        bar.classList.add("show", "synced");
        text.textContent = "نسخة أوفلاين محلية — لا تستخدم المزامنة السحابية";
        updateSyncProgress(0);
        return;
      }

      if (!navigator.onLine) status = "offline";

      if (status === "offline") {
        bar.classList.add("show", "offline");
        text.textContent = "أنت غير متصل — سيتم حفظ العمليات محليًا";
        updateSyncProgress(0);
      } else if (status === "syncing") {
        bar.classList.add("show", "syncing");
        text.textContent = state.queue.length > 0 ? `جارٍ مزامنة ${state.queue.length} عملية` : "جارٍ المزامنة";
        box.classList.add("show");
      } else if (status === "synced") {
        bar.classList.add("show", "synced");
        text.textContent = "تمت المزامنة بنجاح";
        updateSyncProgress(100);
        setTimeout(() => {
          if (state.syncStatus === "synced") {
            bar.classList.remove("show");
            updateSyncProgress(0);
          }
        }, 2200);
      }
    }

    function enqueueSyncOperation(op) {
      if (isLocalOnlyMode()) return;
      state.queue.push({
        id: uid("sync"),
        createdAt: new Date().toISOString(),
        ...op
      });
      saveAppState();
      updatePendingSyncBadge();
      updateSyncStatusBar("offline");
    }

    async function pushFullStateToCloud() {
      if (!navigator.onLine || !isCloudSyncEnabled()) return false;

      try {
        await ensureFirebaseReady();
        const { ref, set, update } = window.feeFirebase;
        const rootPath = getCloudRootPath();

        updateSyncProgress(20);

        await set(ref(firebaseDbRef, `${rootPath}/appState`), {
          settings: state.data.settings,
          customers: state.data.customers,
          invoices: state.data.invoices,
          users: state.data.users,
          shortages: state.data.shortages,
          purchases: state.data.purchases,
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "owner"
        });

        updateSyncProgress(80);

        await update(ref(firebaseDbRef, `${rootPath}/meta`), {
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "owner",
          installationId: generateInstallationId()
        });

        updateSyncProgress(100);
        return true;
      } catch (error) {
        console.error(error);
        updateSyncProgress(0);
        return false;
      }
    }

    async function pullFullStateFromCloud() {
      if (!navigator.onLine || !isCloudSyncEnabled()) return false;

      try {
        await ensureFirebaseReady();
        const { ref, get } = window.feeFirebase;
        const rootPath = getCloudRootPath();
        const snap = await get(ref(firebaseDbRef, `${rootPath}/appState`));

        if (!snap.exists()) return false;

        const cloud = snap.val() || {};
        state.data.settings = { ...DEFAULT_SETTINGS, ...(cloud.settings || {}) };
        state.data.customers = cloud.customers || [];
        state.data.invoices = cloud.invoices || [];
        state.data.users = cloud.users || state.data.users;
        state.data.shortages = cloud.shortages || [];
        state.data.purchases = cloud.purchases || [];
        applyTheme();
        saveAppState();
        return true;
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    function detachRealtimeSync() {
      if (typeof realtimeDetachFn === "function") {
        try { realtimeDetachFn(); } catch {}
      }
      realtimeDetachFn = null;
    }

    async function attachRealtimeSync() {
      detachRealtimeSync();
      if (!navigator.onLine || !isCloudSyncEnabled()) return;

      try {
        await ensureFirebaseReady();
        const { ref, onValue, off } = window.feeFirebase;
        const rootPath = getCloudRootPath();
        const appStateRef = ref(firebaseDbRef, `${rootPath}/appState`);

        const cb = snapshot => {
          if (!snapshot.exists()) return;
          const remote = snapshot.val() || {};
          const localUpdated = new Date(state.data.meta?.updatedAt || 0).getTime();
          const remoteUpdated = Number(remote.updatedAt || 0);
          if (remoteUpdated && remoteUpdated <= localUpdated) return;

          state.data.settings = { ...DEFAULT_SETTINGS, ...(remote.settings || {}) };
          state.data.customers = remote.customers || [];
          state.data.invoices = remote.invoices || [];
          state.data.users = remote.users || state.data.users;
          state.data.shortages = remote.shortages || [];
          state.data.purchases = remote.purchases || [];
          applyTheme();
          saveAppState();
          render();
          showToast("تم تحديث البيانات تلقائيًا", "success");
        };

        onValue(appStateRef, cb);
        realtimeDetachFn = () => off(appStateRef, "value", cb);
      } catch (error) {
        console.error(error);
      }
    }

    async function syncQueueToCloud() {
      if (isLocalOnlyMode()) {
        state.syncStatus = "synced";
        updateSyncStatusBar("synced");
        return true;
      }

      if (!navigator.onLine) {
        updateSyncStatusBar("offline");
        return false;
      }

      state.syncStatus = "syncing";
      updateSyncStatusBar("syncing");
      updateSyncProgress(10);

      const ok = await pushFullStateToCloud();
      if (!ok) {
        state.syncStatus = "offline";
        updateSyncStatusBar("offline");
        return false;
      }

      state.queue = [];
      localStorage.setItem(getQueueKey(), JSON.stringify(state.queue));
      updatePendingSyncBadge();

      state.syncStatus = "synced";
      updateSyncStatusBar("synced");
      return true;
    }

    async function manualSync() {
      if (isLocalOnlyMode()) {
        showToast("هذه نسخة أوفلاين محلية فقط", "warning");
        return;
      }

      if (!navigator.onLine) {
        showToast("لا يوجد اتصال إنترنت", "warning");
        updateSyncStatusBar("offline");
        return;
      }

      state.syncStatus = "syncing";
      updateSyncStatusBar("syncing");
      updateSyncProgress(15);

      await pullFullStateFromCloud();
      await syncQueueToCloud();
      await attachRealtimeSync();
      render();
    }

    function calculateInvoiceTotals(invoice) {
      const subtotal = Number(invoice?.subtotal || 0);
      const discount = Number(invoice?.discount || 0);
      const total = Math.max(0, subtotal - discount);
      const paid = Number(invoice?.paidAmount || 0);
      const remaining = Math.max(0, total - paid);
      return { subtotal, discount, total, paid, remaining };
    }

    function rebuildCustomerBalances() {
      const map = {};
      (state.data.customers || []).forEach(c => map[c.id] = 0);

      (state.data.invoices || []).forEach(inv => {
        const remaining = calculateInvoiceTotals(inv).remaining;
        if (inv.customerId) map[inv.customerId] = (map[inv.customerId] || 0) + remaining;
      });

      (state.data.customers || []).forEach(customer => {
        const manualDebts = (customer.manualDebts || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        const payments = (customer.payments || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        customer.balance = Math.max(0, (map[customer.id] || 0) + manualDebts - payments);
      });
    }

    function getCustomerById(id) {
      return (state.data.customers || []).find(c => c.id === id);
    }

    function getInvoiceById(id) {
      return (state.data.invoices || []).find(i => i.id === id);
    }

    function getPurchaseById(id) {
      return (state.data.purchases || []).find(i => i.id === id);
    }

    function getCreditLimit(customer) {
      return Number(customer?.creditLimit ?? state.data.settings.defaultCreditLimit ?? 0);
    }

    function getLastPaymentDate(customer) {
      const payments = (customer?.payments || []).slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
      return payments[0]?.date || null;
    }

    function getDaysSince(dateStr) {
      if (!dateStr) return 0;
      const diff = Date.now() - new Date(dateStr).getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getOverdueStatus(customer) {
      const balance = Number(customer?.balance || 0);
      if (balance <= 0) return { overdue:false, days:0 };

      const lastPayment = getLastPaymentDate(customer);
      const oldestInvoice = (state.data.invoices || [])
        .filter(i => i.customerId === customer.id)
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const oldestManualDebt = (customer.manualDebts || [])
        .slice()
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const refDate = lastPayment || oldestInvoice?.date || oldestManualDebt?.date;
      if (!refDate) return { overdue:false, days:0 };

      const days = getDaysSince(refDate);
      const overdue = days >= Number(state.data.settings.overdueDaysThreshold || 14);
      return { overdue, days };
    }

    function getAllAlerts() {
      const alerts = [];

      (state.data.customers || []).forEach(customer => {
        const balance = Number(customer.balance || 0);
        const limit = getCreditLimit(customer);

        if (state.data.settings.enableCreditLimitAlerts && limit > 0 && balance > limit) {
          alerts.push({
            type: "credit",
            customerId: customer.id,
            title: "تجاوز الحد الائتماني",
            text: `${customer.name} تجاوز الحد الائتماني`
          });
        }

        const overdue = getOverdueStatus(customer);
        if (state.data.settings.enableOverdueAlerts && overdue.overdue) {
          alerts.push({
            type: "overdue",
            customerId: customer.id,
            title: "تأخر في السداد",
            text: `${customer.name} متأخر عن السداد منذ ${overdue.days} يوم`
          });
        }
      });

      return alerts;
    }

    function getUserDisplayName(userId) {

      return user?.name || user?.username || "المدير";

    function showToast(message, type = "default", duration = 2800) {
      const root = document.getElementById("toast-root");
      const el = document.createElement("div");
      el.className = `toast ${type}`;

      const icon =
        type === "success" ? "fa-circle-check" :
        type === "error" ? "fa-circle-xmark" :
        type === "warning" ? "fa-triangle-exclamation" :
        "fa-bell";

      el.innerHTML = `
        <div class="mt-0.5"><i class="fas ${icon} text-lg"></i></div>
        <div class="flex-1">
          <div class="font-bold text-sm">${message}</div>
        </div>
        <button class="opacity-80 hover:opacity-100" onclick="this.parentElement.remove()">
          <i class="fas fa-xmark"></i>
        </button>
      `;

      root.appendChild(el);

      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-6px)";
        setTimeout(() => el.remove(), 180);
      }, duration);
    }

    function openModal({ title = "", body = "", footer = "", maxWidth = "760px" }) {
      const root = document.getElementById("modal-root");
      root.innerHTML = `
        <div class="modal-backdrop" onclick="closeModal(event)">
          <div class="modal-panel" style="max-width:${maxWidth}" onclick="event.stopPropagation()">
            <div class="p-5 sm:p-6">
              <div class="flex items-start justify-between gap-4 mb-4">
                <div><h3 class="text-xl font-extrabold text-slate-800">${title}</h3></div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center">
                  <i class="fas fa-xmark text-slate-600"></i>
                </button>
              </div>
              <div>${body}</div>
              ${footer ? `<div class="mt-5">${footer}</div>` : ""}
            </div>
          </div>
        </div>
      `;
    }

    function closeModal() {
      document.getElementById("modal-root").innerHTML = "";
    }

    function confirmDialog({
      title = "تأكيد العملية",
      message = "هل أنت متأكد؟",
      confirmText = "تأكيد",
      cancelText = "إلغاء",
      onConfirm = () => {}
    }) {
      window.__confirmAction = () => {
        try { onConfirm(); }
        finally {
          closeModal();
          window.__confirmAction = null;
        }
      };

      openModal({
        title,
        body: `<p class="text-sm text-slate-600 leading-7">${message}</p>`,
        footer: `
          <div class="flex gap-3">
            <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">${cancelText}</button>
            <button onclick="window.__confirmAction && window.__confirmAction()" class="btn flex-1 py-3 rounded-2xl bg-red-600 hover:bg-red-700 text-white font-bold">${confirmText}</button>
          </div>
        `
      });
    }

    function navigate(screen, params = {}) {
      if (params.customerId) state.selectedCustomerId = params.customerId;
      if (params.invoiceId) state.selectedInvoiceId = params.invoiceId;
      state.currentScreen = screen;
      state.screenStack.push(screen);
      saveAppState();
      render();
    }
  </script>
<script>
    function render() {
      rebuildCustomerBalances();
      applyTheme();
      updateHeader();
      updatePendingSyncBadge();

      const container = document.getElementById("app-container");
      const navButtons = document.querySelectorAll(".nav-btn");

      navButtons.forEach(btn => {
        const id = btn.id.split("-")[1];
        const active = (
          id === state.currentScreen ||
          (id === "customers" && state.currentScreen === "customerDetail") ||
          (id === "invoices" && state.currentScreen === "invoiceDetail")
        );

        btn.classList.remove("text-blue-600", "text-gray-500");
        btn.classList.add(active ? "text-blue-600" : "text-gray-500");
      });

      switch (state.currentScreen) {
        case "home":
          renderHome(container);
          break;
        case "customers":
          renderCustomers(container);
          break;
        case "customerDetail":
          renderCustomerDetail(container);
          break;
        case "invoices":
          renderInvoices(container);
          break;
        case "invoiceDetail":
          renderInvoiceDetail(container);
          break;
        case "reports":
          renderReports(container);
          break;
        case "settings":
          renderSettings(container);
          break;
        case "purchases":
          renderPurchases(container);
          break;
        default:
          renderHome(container);
      }

      updateAlertsBadge();
      updateSyncStatusBar(state.syncStatus);
    }

    function renderHome(el) {
      const totalCustomers = state.data.customers.length;
      const totalInvoices = state.data.invoices.length;
      const totalRemaining = state.data.customers.reduce((acc, c) => acc + Number(c.balance || 0), 0);
      const totalSales = state.data.invoices.reduce((acc, inv) => acc + calculateInvoiceTotals(inv).total, 0);
      const totalPurchases = (state.data.purchases || []).reduce((acc, p) => acc + Number(p.price || 0), 0);
      const alerts = getAllAlerts();

      const latestInvoices = [...state.data.invoices]
        .sort((a,b)=> new Date(b.date) - new Date(a.date))
        .slice(0, 5);

      el.innerHTML = `
        <div class="space-y-6">
          <section class="p-6 rounded-[30px] text-white relative overflow-hidden" style="background:linear-gradient(135deg,var(--primary),var(--primary-2),#0f172a)">
            <div class="absolute -top-12 -left-12 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -right-10 w-36 h-36 bg-cyan-300/10 rounded-full blur-2xl"></div>

            <div class="flex items-start justify-between gap-4 flex-wrap relative z-10">
              <div>
                <p class="opacity-80 text-sm">مرحبًا، ${escapeHtml(state.session.displayName)}</p>

                <div class="mt-3 flex flex-wrap gap-2">

                  <span class="badge bg-white/12 text-white"><i class="fas fa-cloud"></i> ${isLocalOnlyMode() ? "أوفلاين محلي" : (navigator.onLine ? "أونلاين" : "أوفلاين")}</span>
                </div>
              </div>

              <div class="text-left">
                <div class="text-sm opacity-80">إجمالي المبيعات</div>
                <div class="text-3xl font-black mt-1">${moneyText(totalSales)}</div>
              </div>
            </div>

            <div class="mt-5 grid grid-cols-2 sm:grid-cols-5 gap-3 relative z-10">
              <div class="bg-white/10 rounded-2xl p-3">
                <div class="text-xs opacity-75">العملاء</div>
                <div class="text-xl font-extrabold mt-1">${totalCustomers}</div>
              </div>
              <div class="bg-white/10 rounded-2xl p-3">
                <div class="text-xs opacity-75">الفواتير</div>
                <div class="text-xl font-extrabold mt-1">${totalInvoices}</div>
              </div>
              <div class="bg-white/10 rounded-2xl p-3">
                <div class="text-xs opacity-75">المتبقي</div>
                <div class="text-xl font-extrabold mt-1">${moneyText(totalRemaining)}</div>
              </div>
              <div class="bg-white/10 rounded-2xl p-3">
                <div class="text-xs opacity-75">المشتريات</div>
                <div class="text-xl font-extrabold mt-1">${moneyText(totalPurchases)}</div>

              <div class="bg-white/10 rounded-2xl p-3">
                <div class="text-xs opacity-75">التنبيهات</div>
                <div class="text-xl font-extrabold mt-1">${alerts.length}</div>
              </div>
            </div>
          </section>

          <section class="grid grid-cols-2 sm:grid-cols-5 gap-3">
            <button onclick="showAddCustomerModal()" class="btn fancy-card rounded-3xl p-4 text-right">

              </div>
              <div class="font-extrabold">عميل جديد</div>

            <button onclick="showInvoiceModal()" class="btn fancy-card rounded-3xl p-4 text-right">

              </div>
              <div class="font-extrabold">فاتورة جديدة</div>

            <button onclick="showPaymentModal()" class="btn fancy-card rounded-3xl p-4 text-right">
              <div class="w-12 h-12 rounded-2xl bg-green-100 text-green-600 flex items-center justify-center mb-3">

            <button onclick="showManualDebtModal()" class="btn fancy-card rounded-3xl p-4 text-right">

              <div class="text-xs text-slate-500 mt-1">إدارة الموردين</div>

            <div class="space-y-3">
              ${alerts.slice(0,3).map(a => `

                    <div class="w-10 h-10 rounded-2xl ${a.type === 'overdue' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'} flex items-center justify-center shrink-0">
                      <i class="fas ${a.type === 'overdue' ? 'fa-clock' : 'fa-credit-card'}"></i>

          <section class="section-card p-4">

    function renderCustomerListItem(customer) {

                  <p class="font-extrabold text-slate-800 truncate">${escapeHtml(customer.name)}</p>

                  <div class="flex flex-wrap gap-2 mt-2">

              <p class="text-lg font-extrabold ${canViewFinancials() ? (balance > 0 ? 'text-red-600' : 'text-green-600') : 'text-slate-400'}">

          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">

    function loginLocalUser() {
      const username = document.getElementById("local-user-username")?.value?.trim();
      const password = document.getElementById("local-user-password")?.value?.trim();

      const user = (state.data.users || []).find(u =>
        u.username === username &&
        u.password === password &&
        u.isActive !== false
      );

      if (!user) {
        showToast("بيانات الدخول غير صحيحة", "error");
        return;
      }

      state.session = {
        userId: user.id,
        displayName: user.name || user.username,
        role: user.role || "user",
        permissions: {

      saveAppState();
      render();

    async function saveSettings() {
      state.data.settings.companyName = document.getElementById("set-company-name")?.value?.trim() || DEFAULT_SETTINGS.companyName;
      state.data.settings.companySecondaryName = document.getElementById("set-company-secondary-name")?.value?.trim() || "";
      state.data.settings.shopName = state.data.settings.companyName;
      state.data.settings.shopPhone = document.getElementById("set-shop-phone")?.value?.trim() || "";
      state.data.settings.shopAddress = document.getElementById("set-shop-address")?.value?.trim() || "";
      state.data.settings.currency = document.getElementById("set-currency")?.value?.trim() || "شيكل";
      state.data.settings.footerNote = document.getElementById("set-footer-note")?.value?.trim() || "شكرًا لتعاملكم معنا";
      state.data.settings.primaryColor = document.getElementById("set-primary-color")?.value || "#1d4ed8";
      state.data.settings.printEmployeeName = !!document.getElementById("set-print-employee-name")?.checked;

      const logoUrl = document.getElementById("set-logo-url")?.value?.trim() || "";
      const logoFile = document.getElementById("set-logo-file")?.files?.[0];

      if (logoFile) {
        const reader = new FileReader();
        reader.onload = e => {
          state.data.settings.logo = e.target.result;
          state.data.settings.logoType = "file";
          finishSaveSettings();
        };
        reader.readAsDataURL(logoFile);
        return;
      } else if (logoUrl) {
        state.data.settings.logo = logoUrl;
        state.data.settings.logoType = "url";
      }

      finishSaveSettings();
    }

    function addInvoiceComposerItem(item = null) {
      const wrapper = document.getElementById("invoice-composer-items");
      if (!wrapper) return;

      const rowId = uid("invitem");
      const row = document.createElement("div");
      row.className = "grid sm:grid-cols-12 gap-3 items-end";
      row.id = rowId;

      row.innerHTML = `
        <div class="sm:col-span-5">
          <label class="block text-xs font-bold text-slate-600 mb-1">اسم الصنف</label>
          <input type="text" class="input inv-item-name" value="${escapeHtml(item?.name || "")}" placeholder="مثال: دفتر">

          <label class="block text-xs font-bold text-slate-600 mb-1">الكمية</label>

        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-bold text-slate-600 mb-1">السعر</label>
          <input type="number" min="0" step="0.01" class="input inv-item-price" value="${item?.price || 0}" oninput="recalculateInvoiceComposer()">
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-bold text-slate-600 mb-1">الإجمالي</label>
          <input type="text" class="input inv-item-total !bg-slate-50" value="0" readonly>
        </div>
        <div class="sm:col-span-1">
          <button onclick="removeInvoiceComposerItem('${rowId}')" class="w-full h-[48px] rounded-2xl bg-red-50 hover:bg-red-100 text-red-600">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `;

      wrapper.appendChild(row);
      recalculateInvoiceComposer();
    }

    function removeInvoiceComposerItem(rowId) {
      document.getElementById(rowId)?.remove();
      recalculateInvoiceComposer();
    }

    function recalculateInvoiceComposer() {
      const rows = [...document.querySelectorAll("#invoice-composer-items > div")];
      let subtotal = 0;

      rows.forEach(row => {
        const qty = parseNumber(row.querySelector(".inv-item-qty")?.value);
        const price = parseNumber(row.querySelector(".inv-item-price")?.value);
        const rowTotal = qty * price;
        const totalInput = row.querySelector(".inv-item-total");
        if (totalInput) totalInput.value = rowTotal.toFixed(2);
        subtotal += rowTotal;
      });

      const discount = parseNumber(document.getElementById("invoice-discount")?.value);
      const paid = parseNumber(document.getElementById("invoice-paid-amount")?.value);
      const total = Math.max(0, subtotal - discount);
      const remaining = Math.max(0, total - paid);

      const subtotalView = document.getElementById("invoice-subtotal-view");
      const totalView = document.getElementById("invoice-total-view");
      const remainingView = document.getElementById("invoice-remaining-view");

      if (subtotalView) subtotalView.textContent = formatCurrency(subtotal);
      if (totalView) totalView.textContent = formatCurrency(total);
      if (remainingView) remainingView.textContent = formatCurrency(remaining);
    }

    function saveInvoice() {
      const customerId = document.getElementById("invoice-customer-id")?.value;
      const invoiceNumber = document.getElementById("invoice-number")?.value?.trim() || `${state.data.settings.invoicePrefix || "INV"}-${Date.now()}`;
      const date = document.getElementById("invoice-date")?.value
        ? new Date(document.getElementById("invoice-date").value).toISOString()
        : new Date().toISOString();
      const note = document.getElementById("invoice-note")?.value?.trim() || "";
      const discount = parseNumber(document.getElementById("invoice-discount")?.value);
      const paidAmount = parseNumber(document.getElementById("invoice-paid-amount")?.value);

      if (!customerId) {
        showToast("اختر العميل أولاً", "error");
        return;
      }

      const customer = getCustomerById(customerId);
      if (!customer) {
        showToast("العميل غير موجود", "error");
        return;
      }

      const rows = [...document.querySelectorAll("#invoice-composer-items > div")];
      const items = rows.map(row => {
        const name = row.querySelector(".inv-item-name")?.value?.trim() || "";
        const qty = parseNumber(row.querySelector(".inv-item-qty")?.value);
        const price = parseNumber(row.querySelector(".inv-item-price")?.value);
        const total = qty * price;
        return { name, qty, price, total };
      }).filter(item => item.name && item.qty > 0);

      if (!items.length) {
        showToast("أضف صنفًا واحدًا على الأقل", "error");
        return;
      }

      const subtotal = items.reduce((a, b) => a + b.total, 0);
      const total = Math.max(0, subtotal - discount);
      const remaining = Math.max(0, total - paidAmount);

      state.data.invoices.push({
        id: uid("invoice"),
        invoiceNumber,
        customerId,
        date,
        items,
        subtotal,
        discount,
        total,
        paidAmount,
        remainingAmount: remaining,
        note,
        createdAt: new Date().toISOString(),
        createdBy: state.session.userId
      });

      enqueueSyncOperation({
        type: "add_invoice",
        payload: { invoiceNumber, customerId, total, remaining }
      });

      saveAppState();
      closeModal();
      render();

      if (remaining > 0) {
        showToast(`تم حفظ الفاتورة، والمتبقي ${formatCurrency(remaining)} سُجل كدين على العميل`, "warning", 4200);
      } else {
        showToast("تم حفظ الفاتورة بنجاح", "success");
      }

      if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
    }

          <meta charset="utf-8">
          <title>فاتورة</title>
          <style>body{margin:0;padding:20px;background:#fff;font-family:Cairo,Arial,sans-serif}</style>
        </head>
        <body>${html}</body>
        </html>
      `);
      w.document.close();
      w.focus();
      setTimeout(() => w.print(), 300);
    }

    async function renderInvoiceCanvas(invoiceId) {
      const root = document.getElementById("capture-root");
      root.innerHTML = buildInvoiceHTML(invoiceId);
      const element = root.firstElementChild;
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true,
        allowTaint: false
      });
      return { root, canvas };
    }

    async function downloadInvoicePDF(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;

      const { root, canvas } = await renderInvoiceCanvas(invoiceId);
      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");

      const pageHeight = 297;
      const imgWidth = 190;
      const imgHeight = canvas.height * imgWidth / canvas.width;

      let heightLeft = imgHeight;
      let position = 10;

      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);

      while (heightLeft > 0) {
        position = heightLeft - imgHeight + 10;
        pdf.addPage();
        pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
        heightLeft -= (pageHeight - 20);
      }

      pdf.save(`${invoice.invoiceNumber}.pdf`);
      root.innerHTML = "";
      showToast("تم حفظ الفاتورة PDF", "success");
    }

    async function downloadInvoiceImage(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;
      const { root, canvas } = await renderInvoiceCanvas(invoiceId);
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = `${invoice.invoiceNumber}.png`;
      link.click();
      root.innerHTML = "";
      showToast("تم حفظ الفاتورة كصورة", "success");
    }

    function downloadInvoiceExcel(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;
      const customer = getCustomerById(invoice.customerId);
      const totals = calculateInvoiceTotals(invoice);

      const rows = [
        ["اسم الشركة", state.data.settings.companyName || ""],
        ["رقم الفاتورة", invoice.invoiceNumber || ""],
        ["العميل", customer?.name || ""],
        ["الهاتف", customer?.phone || ""],
        ["التاريخ", formatDate(invoice.date)],
        ...(state.data.settings.printEmployeeName ? [["الموظف", getUserDisplayName(invoice.createdBy)]] : []),
        [],
        ["الصنف", "الكمية", "السعر", "الإجمالي"],
        ...(invoice.items || []).map(item => [item.name || "", item.qty || 0, item.price || 0, item.total || 0]),
        [],
        ["الإجمالي الفرعي", totals.subtotal],
        ["الخصم", totals.discount],
        ["الإجمالي النهائي", totals.total],
        ["المدفوع", totals.paid],
        ["المتبقي", totals.remaining],
        ["الملاحظات", invoice.note || state.data.settings.footerNote || ""]
      ];

      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "فاتورة");
      XLSX.writeFile(wb, `${invoice.invoiceNumber}.xlsx`);
      showToast("تم حفظ الفاتورة Excel", "success");
    }

    function downloadInvoiceWord(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;
      const customer = getCustomerById(invoice.customerId);
      const totals = calculateInvoiceTotals(invoice);

      const html = `
        <html dir="rtl" lang="ar">
        <head><meta charset="utf-8"></head>
        <body>
          <h2>${escapeHtml(state.data.settings.companyName || "")}</h2>
          <p>رقم الفاتورة: ${escapeHtml(invoice.invoiceNumber || "")}</p>
          <p>العميل: ${escapeHtml(customer?.name || "")}</p>
          <p>الهاتف: ${escapeHtml(customer?.phone || "")}</p>
          <p>التاريخ: ${escapeHtml(formatDate(invoice.date))}</p>
          ${state.data.settings.printEmployeeName ? `<p>الموظف: ${escapeHtml(getUserDisplayName(invoice.createdBy))}</p>` : ""}
          <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
            <tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
            ${(invoice.items || []).map(item => `
              <tr>
                <td>${escapeHtml(item.name || "")}</td>
                <td>${item.qty || 0}</td>
                <td>${escapeHtml(formatCurrency(item.price || 0))}</td>
                <td>${escapeHtml(formatCurrency(item.total || 0))}</td>
              </tr>
            `).join("")}
          </table>
          <p>الإجمالي الفرعي: ${escapeHtml(formatCurrency(totals.subtotal))}</p>
          <p>الخصم: ${escapeHtml(formatCurrency(totals.discount))}</p>
          <p>الإجمالي النهائي: ${escapeHtml(formatCurrency(totals.total))}</p>
          <p>المدفوع: ${escapeHtml(formatCurrency(totals.paid))}</p>
          <p>المتبقي: ${escapeHtml(formatCurrency(totals.remaining))}</p>
          <p>ملاحظات: ${escapeHtml(invoice.note || state.data.settings.footerNote || "")}</p>
        </body>
        </html>
      `;

      const blob = new Blob(['\ufeff', html], { type: "application/msword;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${invoice.invoiceNumber}.doc`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast("تم حفظ الفاتورة Word", "success");
    }

    function sendWhatsApp(customerId) {
      const customer = getCustomerById(customerId);
      if (!customer || !customer.phone) {
        showToast("لا يوجد رقم هاتف لهذا العميل", "warning");
        return;
      }

      const balance = Number(customer.balance || 0);
      const text = `تحية من ${state.data.settings.companyName}
العميل: ${customer.name}
رصيدك الحالي: ${balance} ${state.data.settings.currency}
شكراً لتعاملكم معنا`;

      const phone = customer.phone.replace(/[^\d]/g, "");
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
      window.open(url, "_blank");
    }

    function openExportCustomerOptions(customerId) {
      const customer = getCustomerById(customerId);
      if (!customer) return;
      openModal({
        title: `تصدير كشف ${customer.name}`,
        body: `
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <button onclick="closeModal(); sendWhatsApp('${customerId}')" class="btn p-4 rounded-[24px] bg-green-50 hover:bg-green-100 text-right border border-green-100">
              <div class="w-12 h-12 rounded-2xl bg-green-500 text-white flex items-center justify-center mb-3"><i class="fab fa-whatsapp"></i></div>
              <div class="font-extrabold text-slate-800">واتساب</div>
              <div class="text-xs text-slate-500 mt-1">إرسال الرصيد</div>
            </button>
            <button onclick="closeModal(); navigate('customerDetail',{customerId:'${customerId}'})" class="btn p-4 rounded-[24px] bg-slate-100 hover:bg-slate-200 text-right border border-slate-200">
              <div class="w-12 h-12 rounded-2xl bg-slate-800 text-white flex items-center justify-center mb-3"><i class="fas fa-eye"></i></div>
              <div class="font-extrabold text-slate-800">عرض</div>
              <div class="text-xs text-slate-500 mt-1">فتح العميل</div>
            </button>
          </div>
        `
      });
    }

    function handleLicenseLoginClick() {
      handleLogin();
    }

    async function handleLogin() {
      clearLoginStatus(false);

      const key = document.getElementById("licenseKeyInput").value.trim();
      const btn = document.getElementById("loginBtn");

      btn.disabled = true;
      btn.textContent = "جارٍ التحقق...";

      try {
        const result = await validateLicenseOnline(key, true);
        if (!result.ok) {
          showLoginStatus(result.message || "تعذر تسجيل الدخول", "error", false);
          return;
        }

        saveCachedLicense(result.license);
        resetStateForCurrentKey();

        state.data.settings.companyName = result.license.companyName || state.data.settings.companyName;
        state.data.settings.shopName = state.data.settings.companyName;
        if (result.license.logo) state.data.settings.logo = result.license.logo;

        saveAppState();
        applyTheme();

        setShell("app");
        await pullFullStateFromCloud();
        await attachRealtimeSync();
        updateConnectionUI();
        state.syncStatus = "synced";
        render();
        showToast("تم تسجيل الدخول بنجاح", "success");
      } finally {
        btn.disabled = false;
        btn.textContent = "دخول";
      }
    }

    async function handleEmployeeLogin() {
      clearLoginStatus(true);

      const key = document.getElementById("employeeCompanyKey").value.trim();
      const username = document.getElementById("employeeUsername").value.trim();
      const password = document.getElementById("employeePassword").value.trim();
      const btn = document.getElementById("employeeLoginBtn");

      if (!key || !username || !password) {
        showLoginStatus("يرجى تعبئة جميع الحقول", "error", true);
        return;
      }

      btn.disabled = true;
      btn.textContent = "جارٍ الدخول...";

      try {
        const result = await validateLicenseOnline(key, false);
        if (!result.ok) {
          showLoginStatus(result.message || "تعذر التحقق من المفتاح", "error", true);
          return;
        }

        saveCachedLicense(result.license);
        resetStateForCurrentKey();

        state.data.settings.companyName = result.license.companyName || state.data.settings.companyName;
        state.data.settings.shopName = state.data.settings.companyName;
        if (result.license.logo) state.data.settings.logo = result.license.logo;

        await pullFullStateFromCloud();

        const user = (state.data.users || []).find(u =>
          u.username === username &&
          u.password === password &&
          u.isActive !== false
        );

        if (!user) {
          showLoginStatus("اسم المستخدم أو كلمة المرور غير صحيحة", "error", true);
          return;
        }

        state.session = {
          userId: user.id,
          displayName: user.name || user.username,
          role: user.role || "user",
          permissions: {
            ...(user.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
            ...(user.permissions || {})
          }
        };

        saveAppState();
        applyTheme();
        setShell("app");
        await attachRealtimeSync();
        updateConnectionUI();
        state.syncStatus = "synced";
        render();
        showToast(`مرحبًا ${state.session.displayName}`, "success");
      } finally {
        btn.disabled = false;
        btn.textContent = "دخول موظف";
      }
    }

    function initLoginTabs() {
      document.getElementById("licenseTabBtn").addEventListener("click", () => setLoginMode("license"));
      document.getElementById("employeeTabBtn").addEventListener("click", () => setLoginMode("employee"));
    }

    function bootstrapLicenseFlow() {
      const cached = getCurrentLicense();
      if (!cached) {
        setShell("login");
        setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "license");
        return;
      }

      if (isLicenseExpired(cached)) {
        document.getElementById("expiredTitle").textContent = "انتهى الاشتراك";
        document.getElementById("expiredText").textContent = "انتهت صلاحية المفتاح. يرجى إدخال مفتاح صالح.";
        setShell("expired");
        return;
      }

      resetStateForCurrentKey();

      if (cached.companyName) {
        state.data.settings.companyName = cached.companyName;
        state.data.settings.shopName = cached.companyName;
      }
      if (cached.logo && !state.data.settings.logo) {
        state.data.settings.logo = cached.logo;
      }

      applyTheme();
      setShell("app");
      updateConnectionUI();
      updateSyncStatusBar("synced");

      pullFullStateFromCloud().then(() => {
        attachRealtimeSync();
        render();
      });
    }

    function init() {
      initLoginTabs();

      document.getElementById("loginBtn").addEventListener("click", handleLicenseLoginClick);
      document.getElementById("employeeLoginBtn").addEventListener("click", handleEmployeeLogin);

      document.getElementById("licenseKeyInput").addEventListener("keydown", e => {
        if (e.key === "Enter") handleLicenseLoginClick();
      });

      document.getElementById("employeePassword").addEventListener("keydown", e => {
        if (e.key === "Enter") handleEmployeeLogin();
      });

      document.getElementById("goToLoginBtn").addEventListener("click", () => {
        clearCachedLicense();
        detachRealtimeSync();
        setShell("login");
        setLoginMode("license");
      });

      window.addEventListener("online", async () => {
        updateConnectionUI();
        if (!isLocalOnlyMode()) {
          await syncQueueToCloud();
          await attachRealtimeSync();
        }
        render();
      });

      window.addEventListener("offline", () => {
        updateConnectionUI();
        updateSyncStatusBar("offline");
      });

      window.onpopstate = function() {
        if (state.screenStack.length > 1) {
          state.screenStack.pop();
          state.currentScreen = state.screenStack[state.screenStack.length - 1];
          saveAppState();
          render();
        } else {
          history.pushState(null, null, window.location.pathname);
        }
      };

      history.pushState(null, null, window.location.pathname);
      bootstrapLicenseFlow();
    }

    init();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./sw-fee.js");
        } catch (e) {
          console.error("SW registration failed", e);
        }
      });
    }
  </script>
