<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام إدارة المبيعات والعملاء</title>

  <link rel="manifest" href="./manifest-fee.json" />
  <meta name="theme-color" content="#dbeafe" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap');

    :root{
      --primary:#1d4ed8;
      --primary-2:#2563eb;
      --primary-3:#3b82f6;
      --danger:#dc2626;
      --danger-soft:#fef2f2;
      --success:#16a34a;
      --success-soft:#f0fdf4;
      --warning:#d97706;
      --warning-soft:#fffbeb;
      --dark:#0f172a;
      --muted:#64748b;
      --bg:#f8fafc;
      --card:#ffffff;
      --border:#e2e8f0;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(14,165,233,.06), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 100%);
      color: var(--dark);
      font-family: 'Cairo', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden-force { display:none !important; }

    .glass-header {
      background: rgba(239,246,255,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(191,219,254,.9);
      box-shadow: 0 12px 32px rgba(15,23,42,.08);
    }

    .bottom-nav {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(226,232,240,.9);
      box-shadow: 0 -8px 24px rgba(15,23,42,.08);
    }

    .fancy-card {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 12px 32px rgba(15,23,42,.06);
    }

    .section-card {
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.94));
      border: 1px solid rgba(226,232,240,.88);
      box-shadow: 0 12px 28px rgba(15,23,42,.05);
      border-radius: 28px;
    }

    .card-shadow {
      box-shadow: 0 18px 44px rgba(15,23,42,.12);
    }

    .btn {
      transition: all .18s ease;
      transform: translateY(0);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(.985); }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      outline: none;
      transition: .18s ease;
      font-size: 14px;
      color: var(--dark);
    }

    .input, .select {
      padding: 12px 14px;
      min-height: 48px;
    }

    .textarea {
      padding: 12px 14px;
      min-height: 104px;
      resize: vertical;
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96,165,250,.18);
    }

    .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge-blue { background:rgba(59,130,246,.12); color:#1d4ed8; }
    .badge-red { background:rgba(239,68,68,.12); color:#dc2626; }
    .badge-green { background:rgba(34,197,94,.12); color:#15803d; }
    .badge-yellow { background:rgba(245,158,11,.12); color:#b45309; }
    .badge-slate { background:rgba(100,116,139,.12); color:#334155; }
    .badge-purple { background:rgba(139,92,246,.12); color:#6d28d9; }

    .stat-tile {
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.95));
      border: 1px solid rgba(226,232,240,.86);
      border-radius: 24px;
      box-shadow: 0 10px 24px rgba(15,23,42,.05);
    }

    .status-bar {
      position: sticky;
      top: 74px;
      z-index: 45;
      margin: 10px auto 0;
      width: min(980px, calc(100% - 24px));
      border-radius: 18px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(15,23,42,.10);
      border: 1px solid transparent;
    }

    .status-bar.show { display:flex; }
    .status-bar.offline {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: #fde68a;
    }
    .status-bar.syncing {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }
    .status-bar.synced {
      background: #f0fdf4;
      color: #15803d;
      border-color: #bbf7d0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.48);
      backdrop-filter: blur(6px);
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .18s ease;
    }

    .modal-panel {
      width: 100%;
      max-width: 920px;
      max-height: 90vh;
      overflow: auto;
      background: rgba(255,255,255,.98);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(15,23,42,.22);
      animation: slideUp .18s ease;
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 140;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      background: rgba(15,23,42,.94);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: 0 14px 40px rgba(2,6,23,.28);
      animation: slideDown .18s ease;
    }

    .toast.success { background: rgba(22,163,74,.96); }
    .toast.error { background: rgba(220,38,38,.96); }
    .toast.warning { background: rgba(245,158,11,.98); color:#111827; }

    .login-shell {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fbff 100%);
    }

    .rights-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      color: #1e3a8a;
      text-align: center;
      font-size: 13px;
      line-height: 1.9;
      font-weight: 800;
    }

    .fab-main {
      position: fixed;
      left: 18px;
      bottom: 86px;
      z-index: 40;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 18px 40px rgba(37,99,235,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      border:0;
    }

    .table-modern {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    .table-modern th, .table-modern td {
      padding:10px;
      border-bottom:1px solid #eef2f7;
      text-align:right;
      vertical-align:top;
    }
    .table-modern th {
      background:#f8fafc;
      color:#334155;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .invoice-paper {
      width: 1000px;
      background: #fff;
      color: #0f172a;
      font-family: 'Cairo', sans-serif;
      padding: 28px;
    }

    .invoice-header {
      border: 1px solid #dbeafe;
      background: linear-gradient(135deg, #eff6ff, #ffffff 60%);
      border-radius: 28px;
      padding: 22px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom: 18px;
    }

    .invoice-brand {
      display:flex;
      gap:14px;
      align-items:flex-start;
      min-width:0;
    }

    .invoice-logo {
      width: 82px;
      height: 82px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid #dbeafe;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 8px 24px rgba(37,99,235,.12);
      flex-shrink:0;
    }

    .invoice-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.3;
      color: #0f172a;
    }

    .invoice-subtitle {
      font-size: 14px;
      color: #475569;
      margin-top: 6px;
      line-height: 1.9;
      font-weight: 700;
    }

    .invoice-meta {
      min-width: 280px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }

    .invoice-meta-row {
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:6px 0;
      border-bottom:1px dashed #e2e8f0;
      font-size:13px;
    }

    .invoice-meta-row:last-child { border-bottom:none; }

    .online-dot, .offline-dot {
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }
    .online-dot { background:#16a34a; box-shadow: 0 0 0 6px rgba(22,163,74,.12); }
    .offline-dot { background:#dc2626; box-shadow: 0 0 0 6px rgba(220,38,38,.12); }

    ::-webkit-scrollbar { width:7px; height:7px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }

    @keyframes fadeIn {
      from { opacity:0; } to { opacity:1; }
    }
    @keyframes slideUp {
      from { transform: translateY(12px) scale(.985); opacity:0; }
      to { transform: translateY(0) scale(1); opacity:1; }
    }
    @keyframes slideDown {
      from { transform: translateY(-8px); opacity:0; }
      to { transform: translateY(0); opacity:1; }
    }

    @media print {
      body { background:#fff !important; }
      .no-print { display:none !important; }
    }
  </style>
</head>
<body class="pb-24">

  <div id="loginRoot" class="login-shell">
    <div class="fancy-card w-full max-w-md rounded-[30px] p-6">
      <div class="text-center mb-6">

      <div class="flex items-center gap-3 min-w-0">
        <div class="w-12 h-12 bg-white rounded-2xl overflow-hidden flex items-center justify-center shadow-lg shrink-0 border border-blue-100">
          <i class="fas fa-store text-blue-800" id="default-icon"></i>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      set,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    window.feeFirebase = {
      initializeApp,
      getDatabase,
      ref,
      get,
      update,
      set,
      remove
    };
  </script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCnLAY7zQyBy7gUuL9wszt9aEhiJgvRmxI",
      authDomain: "shop-d52dc.firebaseapp.com",
      databaseURL: "https://shop-d52dc-default-rtdb.firebaseio.com",
      projectId: "shop-d52dc",
      storageBucket: "shop-d52dc.appspot.com",
      messagingSenderId: "97580537866",
      appId: "1:97580537866:web:abc46e5a2f527b6300a7f3",
      measurementId: "G-956RQMBP42"
    };

    const LICENSE_CACHE_KEY = "fee_cached_license_state_v5";
    const INSTALLATION_ID_KEY = "fee_installation_id_v5";
    const LICENSE_PATH = "fee_licenses";

    const STORAGE_KEYS = {
      app: "fee_app_state_v5",
      queue: "fee_sync_queue_v5"
    };

    let firebaseAppRef = null;
    let firebaseDbRef = null;
    let licenseCountdownInterval = null;
    let syncPulseTimeout = null;

    const DEFAULT_SETTINGS = {
      companyName: "اسم الشركة",
      companySecondaryName: "",
      shopName: "اسم الشركة",
      logo: null,
      currency: "شيكل",
      invoicePrefix: "INV",
      taxNumber: "",
      shopPhone: "",
      shopAddress: "",
      footerNote: "شكرًا لتعاملكم معنا",
      defaultCreditLimit: 500,
      overdueDaysThreshold: 14,
      enableOverdueAlerts: true,
      enableCreditLimitAlerts: true
    };

    const DEFAULT_USER_PERMISSIONS = {
      canViewFinancials: true,
      canAddInvoice: true,
      canEditInvoice: true,
      canDeleteInvoice: true,
      canAddPayment: true,
      canAddManualDebt: true,
      canManageCustomers: true,
      canViewReports: true,
      canManageUsers: true,
      canExport: true
    };

    const EMPLOYEE_DEFAULT_PERMISSIONS = {
      canViewFinancials: false,
      canAddInvoice: true,
      canEditInvoice: false,
      canDeleteInvoice: false,
      canAddPayment: false,
      canAddManualDebt: false,
      canManageCustomers: false,
      canViewReports: false,
      canManageUsers: false,
      canExport: true
    };

    function loadAppData() {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.app) || "null");
      return {
        settings: { ...DEFAULT_SETTINGS, ...(saved?.settings || {}) },
        customers: saved?.customers || [],
        invoices: saved?.invoices || [],
        users: saved?.users || [
          {
            id: "owner",
            name: "المدير",
            username: "admin",
            password: "admin",
            role: "admin",
            isActive: true,
            permissions: { ...DEFAULT_USER_PERMISSIONS },
            createdAt: new Date().toISOString()
          }
        ],
        shortages: saved?.shortages || [],
        meta: {
          updatedAt: saved?.meta?.updatedAt || new Date().toISOString(),
          version: 5
        }
      };
    }

    let state = {
      currentScreen: "home",
      screenStack: ["home"],
      selectedCustomerId: null,
      selectedInvoiceId: null,
      syncStatus: "synced",
      queue: JSON.parse(localStorage.getItem(STORAGE_KEYS.queue) || "[]"),
      session: {
        userId: "owner",
        displayName: "المدير",
        role: "admin",
        permissions: { ...DEFAULT_USER_PERMISSIONS }
      },
      data: loadAppData()
    };

    function saveAppState() {
      state.data.meta.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEYS.app, JSON.stringify(state.data));
      localStorage.setItem(STORAGE_KEYS.queue, JSON.stringify(state.queue));
      updatePendingSyncBadge();
    }

    function uid(prefix = "id") {
      return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    }

    function parseNumber(v) {
      const x = parseFloat(v);
      return isNaN(x) ? 0 : x;
    }

    function todayISO() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function formatCurrency(val) {
      const num = Number(val || 0);
      return `${num.toLocaleString('en-US')} ${state.data.settings.currency}`;
    }

    function formatDate(dateStr, withTime = true) {
      const d = new Date(dateStr);
      return d.toLocaleString("ar-EG", withTime ? {
        year:"numeric", month:"2-digit", day:"2-digit",
        hour:"2-digit", minute:"2-digit"
      } : {
        year:"numeric", month:"2-digit", day:"2-digit"
      });
    }

    function toDatetimeLocal(dateStr) {
      const d = new Date(dateStr);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function escapeHtml(str) {

    function calculateInvoiceTotals(invoice) {
      const subtotal = Number(invoice?.subtotal || 0);
      const discount = Number(invoice?.discount || 0);
      const total = Math.max(0, subtotal - discount);
      const paid = Number(invoice?.paidAmount || 0);
      const remaining = Math.max(0, total - paid);
      return { subtotal, discount, total, paid, remaining };
    }

    function calculateCustomerBalance(customer) {
      return Number(customer?.balance || 0);
    }

    function rebuildCustomerBalances() {
      const invoiceMap = {};
      (state.data.customers || []).forEach(c => { invoiceMap[c.id] = 0; });

      (state.data.invoices || []).forEach(invoice => {
        const { remaining } = calculateInvoiceTotals(invoice);
        if (invoice.customerId) {
          invoiceMap[invoice.customerId] = (invoiceMap[invoice.customerId] || 0) + remaining;
        }
      });

      (state.data.customers || []).forEach(customer => {
        const manualDebts = (customer.manualDebts || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        const payments = (customer.payments || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        customer.balance = Math.max(0, (invoiceMap[customer.id] || 0) + manualDebts - payments);
      });
    }

    function getCustomerById(id) {
      return (state.data.customers || []).find(c => c.id === id);
    }

    function getInvoiceById(id) {
      return (state.data.invoices || []).find(i => i.id === id);
    }

    function getCreditLimit(customer) {
      return Number(customer?.creditLimit ?? state.data.settings.defaultCreditLimit ?? 0);
    }

    function getLastPaymentDate(customer) {
      const payments = (customer?.payments || []).slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
      return payments[0]?.date || null;
    }

    function getDaysSince(dateStr) {
      if (!dateStr) return null;
      const diff = Date.now() - new Date(dateStr).getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getOverdueStatus(customer) {
      const balance = calculateCustomerBalance(customer);
      if (balance <= 0) return { overdue:false, days:0 };

      const lastPayment = getLastPaymentDate(customer);
      const oldestInvoice = (state.data.invoices || [])
        .filter(i => i.customerId === customer.id)
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const oldestManualDebt = (customer.manualDebts || [])
        .slice()
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const refDate = lastPayment || oldestInvoice?.date || oldestManualDebt?.date;
      if (!refDate) return { overdue:false, days:0 };

      const days = getDaysSince(refDate);
      const overdue = days >= Number(state.data.settings.overdueDaysThreshold || 14);
      return { overdue, days };
    }

    function getAllAlerts() {
      const alerts = [];
      (state.data.customers || []).forEach(customer => {
        const balance = calculateCustomerBalance(customer);
        const creditLimit = getCreditLimit(customer);

        if (state.data.settings.enableCreditLimitAlerts && balance > creditLimit && creditLimit > 0) {
          alerts.push({
            type: "credit",

            text: `${customer.name} تجاوز الحد الائتماني`

            text: `${customer.name} متأخر عن السداد منذ ${overdueInfo.days} يومًا`
          });
        }
      });
      return alerts;
    }

    async function validateLicenseOnline(key, countLogin = true) {
      const trimmed = String(key || "").trim();
      if (!trimmed) return { ok: false, message: "يرجى إدخال المفتاح" };
      if (!navigator.onLine) return { ok: false, message: "يلزم توفر الإنترنت لأول مرة للتحقق من المفتاح" };

      await ensureFirebaseReady();
      const installationId = getInstallationId();
      const { ref, get, update } = window.feeFirebase;

      try {
        const licenseRef = ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`);
        const snapshot = await get(licenseRef);

        if (!snapshot.exists()) return { ok: false, message: "المفتاح غير صالح لهذا التطبيق" };

        const remoteLicense = snapshot.val() || {};
        if (remoteLicense.status !== "active") return { ok: false, message: "هذا المفتاح معطل" };

        const isPermanent = !!remoteLicense.isPermanent;
        const expiresAt = isPermanent ? null : Number(remoteLicense.expiresAt || 0);
        const allowUnlimitedDevices = !!remoteLicense.allowUnlimitedDevices;
        const maxDevices = allowUnlimitedDevices ? null : Number(remoteLicense.maxDevices || 1);
        const syncMode = remoteLicense.syncMode || "online_sync";
        const companyName = remoteLicense.companyName || DEFAULT_SETTINGS.companyName;

        if (!isPermanent && (!expiresAt || Date.now() >= expiresAt)) {
          return { ok: false, message: "المفتاح منتهي" };
        }

        const loginCount = Number(remoteLicense.loginCount || 0);

        if (countLogin && !allowUnlimitedDevices && loginCount >= maxDevices) {
          return { ok: false, message: "تم استهلاك عدد الأجهزة المسموح لهذا المفتاح" };
        }

        if (countLogin) {
          const updatePayload = {
            lastLoginAt: Date.now(),
            lastInstallationId: installationId
          };
          if (!allowUnlimitedDevices) updatePayload.loginCount = loginCount + 1;

          await update(ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`), updatePayload);
        } else {
          await update(ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`), {
            lastValidatedAt: Date.now()
          });
        }

        const license = {
          key: trimmed,
          companyName,
          planType: remoteLicense.planType || "regular",
          isPermanent,
          expiresAt,
          issuedAt: remoteLicense.issuedAt || Date.now(),
          cachedAt: Date.now(),
          status: remoteLicense.status || "active",
          installationId,
          maxDevices,
          allowUnlimitedDevices,
          loginCount: countLogin ? (allowUnlimitedDevices ? loginCount : loginCount + 1) : loginCount,
          lastValidatedAt: Date.now(),
          syncMode,
          usersEnabled: !!remoteLicense.usersEnabled
        };

        license.isExpired = isLicenseExpired(license);
        if (license.isExpired) return { ok: false, license, message: "المفتاح منتهي" };

        return { ok: true, license, message: "تم التحقق بنجاح" };
      } catch (error) {
        console.error("License validation error:", error);
        return { ok: false, message: "تعذر الاتصال بقاعدة البيانات" };
      }
    }

    async function refreshLicenseStateIfOnline() {
      const stateObj = getCachedLicenseState();
      if (!stateObj || !stateObj.key || !navigator.onLine) return;

      const result = await validateLicenseOnline(stateObj.key, false);

      if (!result.ok) {
        if (result.message === "هذا المفتاح معطل" || result.message === "المفتاح منتهي") {
          const expiredState = { ...stateObj, isExpired: true, cachedAt: Date.now() };
          saveCachedLicenseState(expiredState);
          showExpiredScreen(expiredState);
        }
        return;
      }

      saveCachedLicenseState(result.license);
      startLicenseCountdown();
    }

    async function pushFullStateToCloud() {
      if (!navigator.onLine || !isCloudSyncEnabled()) return false;

      try {
        await ensureFirebaseReady();
        const { ref, set, update } = window.feeFirebase;
        const rootPath = getCloudRootPath();

        await set(ref(firebaseDbRef, `${rootPath}/appState`), {
          settings: state.data.settings,
          customers: state.data.customers,
          invoices: state.data.invoices,
          users: state.data.users,
          shortages: state.data.shortages,
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "system"
        });

        await update(ref(firebaseDbRef, `${rootPath}/meta`), {
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "system",
          installationId: getInstallationId()
        });

        return true;
      } catch (error) {
        console.error("pushFullStateToCloud failed", error);
        return false;
      }
    }

    async function pullFullStateFromCloud() {
      if (!navigator.onLine || !isCloudSyncEnabled()) return false;

      try {
        await ensureFirebaseReady();
        const { ref, get } = window.feeFirebase;
        const rootPath = getCloudRootPath();

        const snap = await get(ref(firebaseDbRef, `${rootPath}/appState`));
        if (!snap.exists()) return false;

        const cloud = snap.val() || {};
        if (!cloud.settings) return false;

        state.data.settings = { ...DEFAULT_SETTINGS, ...(cloud.settings || {}) };
        state.data.customers = cloud.customers || [];
        state.data.invoices = cloud.invoices || [];
        state.data.users = cloud.users || state.data.users;
        state.data.shortages = cloud.shortages || [];
        saveAppState();
        return true;
      } catch (error) {
        console.error("pullFullStateFromCloud failed", error);
        return false;
      }
    }

    async function syncQueueToCloud() {
      if (!navigator.onLine) {
        updateSyncStatusBar("offline");
        return false;
      }

      if (!isCloudSyncEnabled()) {
        state.syncStatus = "synced";
        updateSyncStatusBar("synced");
        return true;
      }

      state.syncStatus = "syncing";
      updateSyncStatusBar("syncing");

      const ok = await pushFullStateToCloud();
      if (!ok) {
        updateSyncStatusBar("offline");
        return false;
      }

      state.queue = [];
      localStorage.setItem(STORAGE_KEYS.queue, JSON.stringify(state.queue));
      updatePendingSyncBadge();
      state.syncStatus = "synced";
      updateSyncStatusBar("synced");
      return true;
    }

    async function manualSync() {
      if (!navigator.onLine) {
        showToast("لا يوجد اتصال إنترنت حالياً", "warning");
        updateSyncStatusBar("offline");
        return;
      }

      state.syncStatus = "syncing";
      updateSyncStatusBar("syncing");

      const pulled = await pullFullStateFromCloud();
      if (!pulled && state.queue.length === 0 && isCloudSyncEnabled()) {
        await pushFullStateToCloud();
      } else {
        await syncQueueToCloud();
      }

      render();
      showToast("تمت المزامنة بنجاح", "success");
    }

    function bootstrapLicenseFlow() {
      const stateObj = getCachedLicenseState();
      if (!stateObj) {
        setShell("login");
        return;
      }

      stateObj.isExpired = isLicenseExpired(stateObj);
      saveCachedLicenseState(stateObj);

      if (stateObj.isExpired) {
        showExpiredScreen(stateObj);
        return;
      }

      if (stateObj.companyName) {
        state.data.settings.companyName = stateObj.companyName;
        state.data.settings.shopName = stateObj.companyName;
      }

      setShell("app");
      startLicenseCountdown();
      refreshLicenseStateIfOnline();
      updateConnectionUI();
      updateSyncStatusBar();
    }

      const key = document.getElementById("licenseKeyInput").value.trim();
      clearLoginStatus();

      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "جارٍ التحقق...";

      try {
        const result = await validateLicenseOnline(key, true);

        if (!result.ok) {
          showLoginStatus(result.message || "تعذر التحقق من المفتاح", "error");
          return;
        }

        saveCachedLicenseState(result.license);

        if (result.license.companyName) {
          state.data.settings.companyName = result.license.companyName;
          state.data.settings.shopName = result.license.companyName;
          saveAppState();
        }

        showLoginStatus("تم تسجيل الدخول بنجاح", "success");
        setShell("app");
        startLicenseCountdown();
        updateConnectionUI();
        updateSyncStatusBar();
        await pullFullStateFromCloud();
        render();
      } finally {
        btn.disabled = false;
        btn.textContent = "دخول";
      }
    }

    function loginLocalUser() {
      const username = document.getElementById("user-login-username")?.value?.trim();
      const password = document.getElementById("user-login-password")?.value?.trim();

      const user = (state.data.users || []).find(u =>
        u.username === username &&
        u.password === password &&
        u.isActive !== false
      );

      if (!user) {
        showToast("بيانات الدخول غير صحيحة", "error");
        return;
      }

      state.session = {
        userId: user.id,
        displayName: user.name || user.username,
        role: user.role || "user",
        permissions: {
          ...(user.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
          ...(user.permissions || {})
        }
      };

      closeModal();
      render();
      showToast(`مرحبًا ${state.session.displayName}`, "success");
    }

      state.session = {

    function addCustomer() {
      const name = document.getElementById("customer-name")?.value?.trim();
      const phone = document.getElementById("customer-phone")?.value?.trim() || "";
      const creditLimit = parseNumber(document.getElementById("customer-credit-limit")?.value);
      const address = document.getElementById("customer-address")?.value?.trim() || "";
      const notes = document.getElementById("customer-notes")?.value?.trim() || "";

      if (!name) {
        showToast("اسم العميل إجباري", "error");
        return;
      }

      state.data.customers.push({
        id: uid("cust"),
        name,
        phone,
        address,
        notes,
        creditLimit,
        balance: 0,
        payments: [],
        manualDebts: [],
        createdAt: new Date().toISOString()
      });

      enqueueSyncOperation({ type: "add_customer", payload: { name, phone } });
      saveAppState();
      closeModal();
      render();
      showToast("تمت إضافة العميل بنجاح", "success");
    }

    function removeInvoiceComposerItem(rowId) {
      document.getElementById(rowId)?.remove();
      recalculateInvoiceComposer();
    }

    function recalculateInvoiceComposer() {
      const rows = [...document.querySelectorAll("#invoice-composer-items > div")];
      let subtotal = 0;

      rows.forEach(row => {
        const qty = parseNumber(row.querySelector(".inv-item-qty")?.value);
        const price = parseNumber(row.querySelector(".inv-item-price")?.value);
        const rowTotal = qty * price;
        const totalInput = row.querySelector(".inv-item-total");
        if (totalInput) totalInput.value = rowTotal.toFixed(2);
        subtotal += rowTotal;
      });

      const discount = parseNumber(document.getElementById("invoice-discount")?.value);
      const paid = parseNumber(document.getElementById("invoice-paid-amount")?.value);
      const total = Math.max(0, subtotal - discount);
      const remaining = Math.max(0, total - paid);

      const subtotalView = document.getElementById("invoice-subtotal-view");
      const totalView = document.getElementById("invoice-total-view");
      const remainingView = document.getElementById("invoice-remaining-view");

      if (subtotalView) subtotalView.textContent = formatCurrency(subtotal);
      if (totalView) totalView.textContent = formatCurrency(total);
      if (remainingView) remainingView.textContent = formatCurrency(remaining);
    }

    function saveInvoice() {
      const customerId = document.getElementById("invoice-customer-id")?.value;
      const invoiceNumber = document.getElementById("invoice-number")?.value?.trim() || `${state.data.settings.invoicePrefix || "INV"}-${Date.now()}`;
      const date = document.getElementById("invoice-date")?.value
        ? new Date(document.getElementById("invoice-date").value).toISOString()
        : new Date().toISOString();
      const note = document.getElementById("invoice-note")?.value?.trim() || "";
      const discount = parseNumber(document.getElementById("invoice-discount")?.value);
      const paidAmount = parseNumber(document.getElementById("invoice-paid-amount")?.value);

      if (!customerId) {
        showToast("اختر العميل أولاً", "error");
        return;
      }

      const customer = getCustomerById(customerId);
      if (!customer) {
        showToast("العميل غير موجود", "error");
        return;
      }

      const rows = [...document.querySelectorAll("#invoice-composer-items > div")];
      const items = rows.map(row => {
        const name = row.querySelector(".inv-item-name")?.value?.trim() || "";
        const qty = parseNumber(row.querySelector(".inv-item-qty")?.value);
        const price = parseNumber(row.querySelector(".inv-item-price")?.value);
        const total = qty * price;
        return { name, qty, price, total };
      }).filter(item => item.name && item.qty > 0);

      if (!items.length) {
        showToast("أضف صنفًا واحدًا على الأقل", "error");
        return;
      }

      const subtotal = items.reduce((a, b) => a + b.total, 0);
      const total = Math.max(0, subtotal - discount);
      const remaining = Math.max(0, total - paidAmount);

      state.data.invoices.push({
        id: uid("invoice"),
        invoiceNumber,
        customerId,
        date,
        items,
        subtotal,
        discount,
        total,
        paidAmount,
        remainingAmount: remaining,
        note,
        createdAt: new Date().toISOString(),
        createdBy: state.session.userId
      });

      enqueueSyncOperation({
        type: "add_invoice",
        payload: { invoiceNumber, customerId, total, remaining }
      });

      saveAppState();
      closeModal();
      render();

      if (remaining > 0) {
        showToast(`تم حفظ الفاتورة، والمتبقي ${formatCurrency(remaining)} سُجل كدين على العميل`, "warning", 4200);
      } else {
        showToast("تم حفظ الفاتورة بنجاح", "success");
      }
    }

    function saveEditedUser(userId) {
      const user = state.data.users.find(u => u.id === userId);
      if (!user) return;

      const name = document.getElementById("edit-user-name")?.value?.trim();
      const username = document.getElementById("edit-user-username")?.value?.trim();
      const password = document.getElementById("edit-user-password")?.value?.trim();
      const role = document.getElementById("edit-user-role")?.value || "user";
      const isActive = document.getElementById("edit-user-status")?.value === "active";
      const permissions = collectPermissionsFromForm("edit-user");

      if (!name || !username || !password) {
        showToast("يرجى تعبئة البيانات الأساسية", "error");
        return;
      }

      const duplicate = state.data.users.find(u => u.username === username && u.id !== userId);
      if (duplicate) {
        showToast("اسم المستخدم مستخدم بالفعل", "error");
        return;
      }

      user.name = name;
      user.username = username;
      user.password = password;
      user.role = role;
      user.isActive = isActive;
      user.permissions = permissions;
      user.updatedAt = new Date().toISOString();

      enqueueSyncOperation({ type: "edit_user", payload: { userId, username } });
      saveAppState();
      closeModal();
      render();
      showToast("تم تعديل المستخدم", "success");
    }

    function exportBackup() {
      const data = JSON.stringify({
        settings: state.data.settings,
        customers: state.data.customers,
        invoices: state.data.invoices,
        users: state.data.users,
        shortages: state.data.shortages,

        version: 5
      }, null, 2);

      const blob = new Blob([data], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `fee_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      showToast("تم تحميل النسخة الاحتياطية", "success");
    }

    function importBackup() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json";

      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = event => {
          try {
            const imported = JSON.parse(event.target.result);
            if (!imported.customers || !imported.settings) {
              showToast("الملف غير صالح", "error");
              return;
            }

            state.data.settings = { ...DEFAULT_SETTINGS, ...(imported.settings || {}) };
            state.data.customers = imported.customers || [];
            state.data.invoices = imported.invoices || [];
            state.data.users = imported.users || state.data.users;
            state.data.shortages = imported.shortages || [];

            saveAppState();
            render();
            showToast("تم استيراد النسخة الاحتياطية بنجاح", "success");
          } catch {
            showToast("تعذر قراءة الملف", "error");
          }
        };
        reader.readAsText(file);
      };

      input.click();
    }

    async function downloadInvoicePDF(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;

      const root = document.getElementById("capture-root");
      root.innerHTML = buildInvoiceHTML(invoiceId);

      const element = root.firstElementChild;
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true
      });

      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");

      const pageWidth = 210;
      const pageHeight = 297;
      const imgWidth = 190;
      const imgHeight = canvas.height * imgWidth / canvas.width;

      let heightLeft = imgHeight;
      let position = 10;

      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);

      while (heightLeft > 0) {
        position = heightLeft - imgHeight + 10;
        pdf.addPage();
        pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
        heightLeft -= (pageHeight - 20);
      }

      pdf.save(`${invoice.invoiceNumber}.pdf`);
      root.innerHTML = "";
      showToast("تم حفظ الفاتورة PDF", "success");
    }

    function buildCustomerStatementHTML(customerId) {
      const customer = getCustomerById(customerId);
      if (!customer) return "";

      const invoices = state.data.invoices.filter(i => i.customerId === customerId).sort((a,b)=> new Date(a.date)-new Date(b.date));
      const payments = (customer.payments || []).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));
      const manualDebts = (customer.manualDebts || []).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));
      const balance = calculateCustomerBalance(customer);

      const rows = [];

      invoices.forEach(inv => {
        const totals = calculateInvoiceTotals(inv);
        rows.push({ date: inv.date, type: "فاتورة", note: `فاتورة رقم ${inv.invoiceNumber}`, debit: totals.remaining, credit: 0 });
      });

      manualDebts.forEach(d => {
        rows.push({ date: d.date, type: "دين مباشر", note: d.note || "دين مباشر", debit: d.amount, credit: 0 });
      });

      payments.forEach(p => {
        rows.push({ date: p.date, type: "دفعة", note: p.note || "دفعة عميل", debit: 0, credit: p.amount });
      });

      rows.sort((a,b)=> new Date(a.date)-new Date(b.date));

      return `
        <html dir="rtl" lang="ar">
        <head>
          <meta charset="utf-8">
          <title>كشف حساب - ${escapeHtml(customer.name)}</title>
          <style>
            body{font-family:Arial,sans-serif;padding:20px;direction:rtl;color:#111}
            h1,h2,p{margin:0 0 8px}
            table{width:100%;border-collapse:collapse;margin-top:18px;font-size:12px}
            th,td{border:1px solid #ddd;padding:8px;text-align:right}
            th{background:#f3f4f6}
          </style>
        </head>
        <body>
          <h2>${escapeHtml(state.data.settings.companyName || "")}</h2>
          <p><strong>العميل:</strong> ${escapeHtml(customer.name)}</p>
          <p><strong>الهاتف:</strong> ${escapeHtml(customer.phone || "-")}</p>
          <p><strong>الرصيد الحالي:</strong> ${balance} ${escapeHtml(state.data.settings.currency)}</p>
          <table>
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>النوع</th>
                <th>الملاحظة</th>
                <th>مدين</th>
                <th>دائن</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${formatDate(r.date)}</td>
                  <td>${escapeHtml(r.type)}</td>
                  <td>${escapeHtml(r.note)}</td>
                  <td>${r.debit ? formatCurrency(r.debit) : "-"}</td>
                  <td>${r.credit ? formatCurrency(r.credit) : "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </body>
        </html>
      `;
    }

    async function downloadCustomerPDF(customerId) {
      const customer = getCustomerById(customerId);
      if (!customer) return;

      const invoices = state.data.invoices.filter(i => i.customerId === customerId).sort((a,b)=> new Date(a.date)-new Date(a.date));
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");

      pdf.setFontSize(16);
      pdf.text(state.data.settings.companyName || "Store", 105, 14, { align: "center" });
      pdf.setFontSize(11);
      pdf.text(`Customer: ${customer.name}`, 14, 24);
      pdf.text(`Phone: ${customer.phone || "-"}`, 14, 30);
      pdf.text(`Balance: ${calculateCustomerBalance(customer)} ${state.data.settings.currency}`, 14, 36);

                </div>
                <span class="badge ${navigator.onLine ? 'badge-green' : 'badge-red'}">
                  <i class="fas ${navigator.onLine ? 'fa-wifi' : 'fa-wifi-slash'}"></i>
                  ${navigator.onLine ? 'متصل' : 'أوفلاين'}
                </span>
              </div>
            </div>

            <div class="section-card p-4 rounded-[24px]">
              <div class="font-extrabold text-slate-800">العمليات المعلقة</div>
              <div class="text-sm text-slate-500 mt-1">عدد العمليات المنتظرة للمزامنة: ${state.queue.length}</div>
            </div>
          </div>
        `,
        footer: `
          <div class="flex gap-3">
            <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إغلاق</button>
            <button onclick="closeModal(); manualSync();" class="btn flex-1 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold">مزامنة الآن</button>
          </div>
        `
      });
    }

    function init() {
      document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
      document.getElementById("licenseKeyInput")?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
      document.getElementById("goToLoginBtn")?.addEventListener("click", () => {
        clearCachedLicenseState();
        stopLicenseCountdown();
        setShell("login");
      });

      window.addEventListener("online", async () => {
        updateConnectionUI();
        await syncQueueToCloud();
        render();
      });

      window.addEventListener("offline", () => {
        updateConnectionUI();
        updateSyncStatusBar("offline");
      });

      window.onpopstate = function() {
        if (state.screenStack.length > 1) {
          state.screenStack.pop();
          state.currentScreen = state.screenStack[state.screenStack.length - 1];
          render();
        } else {
          history.pushState(null, null, window.location.pathname);
        }
      };

      history.pushState(null, null, window.location.pathname);
      bootstrapLicenseFlow();

      pullFullStateFromCloud().then(() => {
        render();
      });
    }

    init();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("./sw-fee.js");
          console.log("SW registered", reg);
          navigator.serviceWorker.addEventListener("message", event => {
            console.log("SW message:", event.data);
          });
        } catch (e) {
          console.error("SW registration failed", e);
        }
      });
    }
  </script>
</body>
</html>
